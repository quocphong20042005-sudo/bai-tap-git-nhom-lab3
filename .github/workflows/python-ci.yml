name: Python Code Quality Check (CI)

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Lay code moi nhat tu kho
        uses: actions/checkout@v4

      - name: Cai dat Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Chay Unit Test
        run: |
          python -m unittest test_main.py